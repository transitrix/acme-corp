name: PlantUML lint

on:
  push:
  pull_request:

jobs:
  puml-lint:
    name: Validate .puml files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Download PlantUML 1.2024.8
        run: |
          curl -sSL -o plantuml.jar \
            https://github.com/plantuml/plantuml/releases/download/v1.2024.8/plantuml-1.2024.8.jar

      - name: Validate .puml files
        run: |
          files=$(find diagrams -name "*.puml" 2>/dev/null | sort)
          if [ -z "$files" ]; then
            echo "No .puml files found in diagrams/ — nothing to check."
            exit 0
          fi
          count=$(echo "$files" | wc -l)
          echo "Checking $count .puml file(s)..."
          echo "$files" | xargs java -jar plantuml.jar -checkonly
          echo "All .puml files passed syntax check."
