# DGCA chain (DGA mode) — direct driver → goal → action for the compliance
# workstream, where the transformation step is implicit. Notation spec:
# notations/views/02-dgca.md. Full-tier projection form — element data lives
# in canon/elements/**; the action set derives from every ACTION whose
# `goals[]` includes GOAL-EU-1, i.e. the full GDPR remediation programme
# (canon/elements/05_implementation/actions/ACTION-GDPR-*.yaml and its
# Initiative/Programme parents), not a hand-picked subset.

notation: dgca
spec_version: "0.1"

id: DGCA-COMPLIANCE-DGA-1
name: "EU Compliance 2026 — DGA view"
description: >
  Driver → Goal → Action chain for the GDPR/NIS2 compliance workstream.
  Changes layer disabled — actions map directly to the compliance goal.
period: "2026"
date: "2026-06-10"
author: "Acme Compliance Office"

view_config:
  goals:
    filter: ids
    ids: [GOAL-EU-1]
  factors:
    surface: derived
  actions:
    surface: derived
  layers:
    drivers: on
    goals: on
    changes: off          # DGA mode — Driver → Goal → Action
    actions: on
